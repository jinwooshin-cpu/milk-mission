  .gbtn.gas { background:rgba(143,214,148,.95); box-shadow:0 5px 0 #5fa86a; width:128px; height:54px; font-size:19px; }

  .gover button { margin-top:18px; border:none; border-radius:18px; padding:16px 34px; font-family:'Jua',sans-serif; font-size:22px; background:#ffb43d; color:#fff; box-shadow:0 5px 0 #e8920a; cursor:pointer; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, enableIndexedDbPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CFG = window.MILK_CONFIG;
const appEl = document.getElementById('app');

const DEFAULT_MISSIONS = [
  { id:'milk',    emoji:'🥛', name:'우유 마시기', reward:500 },
  { id:'walk',    emoji:'🐕', name:'쿠키 산책',   reward:1000 },
  { id:'recycle', emoji:'♻️', name:'분리수거',    reward:300 }
];
const KIDS = [
  { id:'doyun', name:'도윤', avatar:'🦊', color:'#ffb43d', sh:'#e8920a' },
  { id:'jiyun', name:'지윤', avatar:'🐻', color:'#5fa0e8', sh:'#3a78c2' }
];
const kidMeta = (id)=> KIDS.find(k=>k.id===id) || KIDS[0];
function freshKids(){ const o={}; KIDS.forEach(k=> o[k.id]={ name:k.name, done:{}, ledger:[] }); return o; }

const LS_ROLE = 'milkRole';
const getRole = ()=> localStorage.getItem(LS_ROLE);
const setRole = (r)=> localStorage.setItem(LS_ROLE, r);

const state = {
  data: { missions: DEFAULT_MISSIONS.slice(), kids: freshKids() },
  y: new Date().getFullYear(),
  m: new Date().getMonth(),
  viewKid: 'doyun',            // 관리자 화면에서 보고 있는 아이
  confetti: [], justTapped:false, cheer:'',
  sync:'connecting', ready:false
};

/* ---------- Firebase ---------- */
let db=null, docRef=null;
const configFilled = CFG.firebase.apiKey && !CFG.firebase.apiKey.startsWith('여기에');

function convDone(raw){
  const done={}; raw=raw||{};
  Object.keys(raw).forEach(k=>{
    const v=raw[k];
    if(v===true) done[k]=['milk'];
    else if(Array.isArray(v)) done[k]=v.slice();
    else if(v&&typeof v==='object') done[k]=Object.keys(v).filter(x=>v[x]);
  });
  return done;
}
function migrate(d){
  const missions = (Array.isArray(d.missions)&&d.missions.length)? d.missions : DEFAULT_MISSIONS.slice();
  let kids;
  if(d.kids && typeof d.kids==='object' && (d.kids.doyun || d.kids.jiyun)){
    kids = freshKids();
    KIDS.forEach(k=>{
      const src=d.kids[k.id]||{};
      kids[k.id]={ name:k.name, done:convDone(src.done), ledger:Array.isArray(src.ledger)?src.ledger:[] };
    });
  } else {
    // 옛 단일 아이 구조 -> 도윤이에게 이전
    let ledger = Array.isArray(d.ledger)? d.ledger.slice() : [];
    if(Array.isArray(d.payouts)) d.payouts.forEach(p=> ledger.push({ id:p.id||rid(), date:p.date, type:'out', amount:p.amount, note:p.note||'지급' }));
    kids = freshKids();
    kids.doyun = { name:'도윤', done:convDone(d.done), ledger };
  }
  return { missions, kids };
}

function initFirebase(){
  if(!configFilled) return false;
  try {
    const fbApp = initializeApp(CFG.firebase);
    db = getFirestore(fbApp);
    enableIndexedDbPersistence(db).catch(()=>{});
    docRef = doc(db, 'families', CFG.familyCode);
    onSnapshot(docRef, (snap)=>{
      state.sync='ok';
      if(snap.exists()){ state.data = migrate(snap.data()); }
      else { save(); }
      render();
    }, (err)=>{ state.sync='error'; console.error(err); render(); });
    return true;
  } catch(e){ console.error(e); state.sync='error'; return false; }
}

let saveTimer=null;
function save(){
  try { localStorage.setItem('milkData', JSON.stringify(state.data)); } catch(e){}
  if(!docRef) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    setDoc(docRef, state.data, { merge:false })
      .then(()=>{ if(state.sync!=='ok'){ state.sync='ok'; render(); } })
      .catch((e)=>{ state.sync='offline'; console.warn('오프라인 저장 대기:',e); render(); });
  }, 150);
}

/* ---------- 유틸 ---------- */
const WEEKDAYS = ['일','월','화','수','목','금','토'];
const rid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const key = (y,m,d)=> y+'-'+(m+1)+'-'+d;
const won = (n)=> (Number(n)||0).toLocaleString('ko-KR')+'원';
const esc = (s)=> String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const missionById = (id)=> state.data.missions.find(m=>m.id===id);
function getKidId(){ return getRole()==='admin' ? (state.viewKid||'doyun') : (localStorage.getItem('milkKid')||'doyun'); }
function kidData(){ const k=state.data.kids[getKidId()]; return k || (state.data.kids[getKidId()]={ name:kidMeta(getKidId()).name, done:{}, ledger:[] }); }
const doneIds = (y,m,d)=> kidData().done[key(y,m,d)] || [];

function toggleMission(y,m,d,mid,celebrate){
  const kd = kidData();
  const k = key(y,m,d);
  const arr = (kd.done[k]||[]).slice();
  const i = arr.indexOf(mid);
  const turningOn = i<0;
  if(turningOn) arr.push(mid); else arr.splice(i,1);
  if(arr.length) kd.done[k]=arr; else delete kd.done[k];
  save();
  if(turningOn && celebrate){
    fireConfetti();
    const mn = (missionById(mid)||{}).name || '';
    const cheers = ['최고야! 🎉', mn+' 완료! 멋져!', '오늘도 성공!', '잘했어! 👏', '용돈 GET! 💰', '내일도 같이 하자!'];
    state.cheer = cheers[Math.floor(Math.random()*cheers.length)];
    state.justTapped = true;
    clearTimeout(window._jt);
    window._jt = setTimeout(()=>{ state.justTapped=false; render(); }, 1000);
  }
  render();
}

function fireConfetti(){
  const colors=['#ffd76b','#8fd694','#7fb0ff','#ff9bb3','#c9a0ff','#ffa94d'];
  const pieces=[];
  for(let i=0;i<26;i++){
    pieces.push('position:absolute; top:-10px; left:'+(5+Math.random()*90)+'%; width:11px; height:14px; background:'
      +colors[i%colors.length]+'; border-radius:2px; animation:confetti '+(1.1+Math.random()*0.9)+'s ease-in '+(Math.random()*0.25)+'s forwards;');
  }
  state.confetti=pieces;
  clearTimeout(window._ct);
  window._ct=setTimeout(()=>{ state.confetti=[]; render(); },2400);
}

/* ---------- 파생값 ---------- */
function derive(){
  const { y,m } = state, done=kidData().done;
  let totalCompletions=0, totalEarned=0, monthEarned=0, monthCount=0;
  Object.keys(done).forEach(k=>{
    const isMonth = k.startsWith(y+'-'+(m+1)+'-');
    done[k].forEach(mid=>{
      const mm = missionById(mid); const rew = mm? (Number(mm.reward)||0):0;
      totalCompletions++; totalEarned+=rew;
      if(isMonth){ monthEarned+=rew; monthCount++; }
    });
  });
  const ledger = kidData().ledger;
  const ledIn  = ledger.filter(e=>e.type==='in').reduce((s,e)=>s+(Number(e.amount)||0),0);
  const ledOut = ledger.filter(e=>e.type==='out').reduce((s,e)=>s+(Number(e.amount)||0),0);
  const totalIn = totalEarned + ledIn;
  const balance = totalIn - ledOut;
  // streak: 하루에 1개 이상 완료한 날의 연속(오늘 또는 어제 기준)
  let streak=0; const t=new Date();
  for(let i=0;i<400;i++){
    const dt=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);
    if((done[key(dt.getFullYear(),dt.getMonth(),dt.getDate())]||[]).length) streak++;
    else { if(i===0) continue; break; }
  }
  const level = Math.floor(totalCompletions/7)+1;
  const toNext = 7-(totalCompletions%7);
  const progressPct = ((totalCompletions%7)/7)*100;
  const levelEmoji = ['🐣','🐥','🐤','🐔','🦄','👑'][Math.min(level-1,5)];
  return { totalCompletions, totalEarned, monthEarned, monthCount, ledIn, ledOut, totalIn, balance, streak, level, toNext, progressPct, levelEmoji };
}

/* ---------- 통합 용돈기입장(자동 미션수입 + 수동 항목) ---------- */
function buildLedger(){
  const rows=[]; const kd=kidData();
  Object.keys(kd.done).forEach(k=>{
    const ids=kd.done[k];
    const amt=ids.reduce((s,mid)=>{ const mm=missionById(mid); return s+(mm?(Number(mm.reward)||0):0); },0);
    if(amt>0){
      const names=ids.map(mid=>(missionById(mid)||{}).emoji||'•').join(' ');
      rows.push({ date:k, type:'in', amount:amt, note:'미션 '+ids.length+'개 '+names, auto:true });
    }
  });
  kd.ledger.forEach(e=> rows.push(Object.assign({}, e)));
  // 날짜 정렬용 키
  const dkey=(s)=>{ const [y,mo,d]=s.split('-').map(Number); return y*10000+mo*100+d; };
  rows.sort((a,b)=> dkey(a.date)-dkey(b.date) || (a.auto?-1:1));
  let run=0; rows.forEach(r=>{ run += r.type==='in'? r.amount : -r.amount; r.bal=run; });
  return rows;
}

/* ---------- 달력 ---------- */
function buildCells(){
  const { y,m }=state;
  const first=new Date(y,m,1).getDay(); const daysIn=new Date(y,m+1,0).getDate();
  const today=new Date(); const isThisMonth=today.getFullYear()===y&&today.getMonth()===m;
  let html='';
  for(let i=0;i<first;i++) html+='<div style="min-height:46px;"></div>';
  for(let d=1;d<=daysIn;d++){
    const ids=doneIds(y,m,d); const n=ids.length;
    const isToday=isThisMonth&&today.getDate()===d;
    const bg = n? 'background:#fff7d6; border:2px solid #ffd76b;' : 'background:#f4f8ff; border:2px solid '+(isToday?'#7fb0ff':'transparent')+';';
    const numCol = n? '#c79100':'#5a7bab';
    const mark = n? '<span style="font-size:12px; animation:pop .35s ease;">⭐'+n+'</span>' : '';
    html+='<div class="cell" style="'+bg+'" data-d="'+d+'"><span style="font-size:13px; color:'+numCol+'; font-weight:700;">'+d+'</span>'+mark+'</div>';
  }
  return html;
}
function bindCells(){
  document.querySelectorAll('#cells .cell').forEach(c=>{

/* ---------- 액션 ---------- */
function shiftMonth(delta){ let nm=state.m+delta, ny=state.y; if(nm<0){nm=11;ny--;} if(nm>11){nm=0;ny++;} state.y=ny; state.m=nm; render(); }

function deleteMission(id){
  const mm=missionById(id); if(!mm) return;
  if(!confirm('"'+mm.name+'" 미션을 삭제할까요?\n(지난 기록의 적립액은 그만큼 줄어듭니다)')) return;
  state.data.missions=state.data.missions.filter(x=>x.id!==id);
  save(); render();
}
function deleteEntry(id){ const kd=kidData(); kd.ledger=kd.ledger.filter(e=>e.id!==id); save(); render(); }

/* 미션 추가/수정 */
function openMission(id){
  const mm = id? missionById(id) : null;
  const ov=makeOverlay(`
    <h2>${mm?'미션 수정':'미션 추가'}</h2>
    <p>이모지 · 이름 · 한 번 할 때 용돈</p>
    <input class="field" id="mEmoji" placeholder="이모지 (예: 🐕)" value="${mm?esc(mm.emoji):''}" maxlength="4">
    <input class="field" id="mName" placeholder="미션 이름 (예: 쿠키 산책)" value="${mm?esc(mm.name):''}">
    <input class="field" id="mRew" type="number" inputmode="numeric" placeholder="용돈(원)" value="${mm?mm.reward:500}">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="mCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="mSave" style="flex:1;">저장</button>
    </div>`);
  ov.querySelector('#mCancel').onclick=()=>ov.remove();
  ov.querySelector('#mSave').onclick=()=>{
    const emoji=ov.querySelector('#mEmoji').value.trim()||'⭐';
    const name=ov.querySelector('#mName').value.trim();
    const reward=Math.max(0, Math.round(Number(ov.querySelector('#mRew').value)||0));
    if(!name){ alert('미션 이름을 입력해 주세요'); return; }
    if(mm){ mm.emoji=emoji; mm.name=name; mm.reward=reward; }
    else { state.data.missions.push({ id:rid(), emoji, name, reward }); }
    save(); ov.remove(); render();
  };
}

/* 용돈기입장 항목 추가/수정 */
function openEntry(type, kid, existing){
  const todayStr=new Date().toISOString().slice(0,10);
  const e=existing||null;
  const ov=makeOverlay(`
    <h2>${e?'기록 수정':(type==='in'?'수입 추가':(kid?'🛒 오늘 뭐 샀어요?':'지출 추가'))}</h2>
    <div class="seg" id="seg">
      <button data-t="in" class="${(e?e.type:type)==='in'?'sel-in':''}">+ 수입</button>
      <button data-t="out" class="${(e?e.type:type)==='out'?'sel-out':''}">− 지출</button>
    </div>
    <input class="field" id="eAmt" type="number" inputmode="numeric" placeholder="금액(원)" value="${e?e.amount:''}">
    <input class="field" id="eNote" placeholder="${type==='in'?'내용 (예: 용돈, 세뱃돈)':'무엇을 샀나요? (예: 과자)'}" value="${e?esc(e.note||''):''}">
    <input class="field" id="eDate" type="date" value="${e?e.date9||e.date:todayStr}">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="eCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="eSave" style="flex:1;">${e?'수정':'기록하기'}</button>
    </div>`);
  let t = e? e.type : type;
  const segBtns=ov.querySelectorAll('#seg button');
  segBtns.forEach(b=> b.onclick=()=>{ t=b.getAttribute('data-t'); segBtns.forEach(x=>x.className=''); b.className = t==='in'?'sel-in':'sel-out'; });
  ov.querySelector('#eCancel').onclick=()=>ov.remove();
  ov.querySelector('#eSave').onclick=()=>{
    const amount=Math.round(Number(ov.querySelector('#eAmt').value)||0);
    if(amount<=0){ alert('금액을 입력해 주세요'); return; }
    const isoDate=ov.querySelector('#eDate').value||todayStr;
    const [yy,mm,dd]=isoDate.split('-').map(Number);
    const dateKey = yy+'-'+mm+'-'+dd;
    const note=ov.querySelector('#eNote').value.trim();
    if(e){ e.type=t; e.amount=amount; e.note=note; e.date=dateKey; delete e.date9; }
    else { kidData().ledger.push({ id:rid(), type:t, amount, note, date:dateKey }); }
    save(); ov.remove(); render();
  };
}
function editEntry(id){
  const e=kidData().ledger.find(x=>x.id===id); if(!e) return;
  // date(YYYY-M-D) -> input[type=date] 용 YYYY-MM-DD
  const [y,m,d]=e.date.split('-').map(Number);
  e.date9 = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  openEntry(e.type, false, e);
}

/* 날짜별 미션 체크 편집 (달력 셀 클릭) */
function openDay(y,m,d){
  const ids=doneIds(y,m,d);
  const rows=state.data.missions.map(mm=>{
    const on=ids.includes(mm.id);
    return `<div class="mrow ${on?'on':''}" style="cursor:pointer;" data-tg="${mm.id}">
      <span class="memoji">${mm.emoji||'⭐'}</span>
      <div style="flex:1; text-align:left;"><div class="mname">${esc(mm.name)}</div><div class="mrew">${won(mm.reward)}</div></div>
      <span style="font-size:24px;">${on?'✅':'⬜'}</span>
    </div>`;
  }).join('') || '<p style="color:#9bb3d4;">미션이 없습니다.</p>';
  const ov=makeOverlay(`
    <h2>${y}년 ${m+1}월 ${d}일</h2>
    <p>완료한 미션을 눌러서 켜고 끄세요</p>
    <div>${rows}</div>
    <button class="smallbtn" id="dClose" style="width:100%; margin-top:6px;">닫기</button>`);
  ov.querySelector('#dClose').onclick=()=>ov.remove();
  ov.querySelectorAll('[data-tg]').forEach(r=> r.onclick=()=>{
    toggleMission(y,m,d, r.getAttribute('data-tg'), false);
    ov.remove(); openDay(y,m,d); // 새로고침
  });
}

  resize(); window.addEventListener('resize',resize);

  const best0=Math.round(+(localStorage.getItem('carBest')||0));
  ov.querySelector('#hBest').textContent=best0;

  const ctrl={gas:false,brake:false};
  const MAXA=2.0;            // 최대 핸들 회전(라디안)
  let targetSteer=0, keySteer=0, dragging=false, startA=0, startSteer=0;
  const wheelEl=ov.querySelector('#wheel');
  function pAng(e){ const r=wheelEl.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2; return Math.atan2(e.clientY-cy, e.clientX-cx); }
  wheelEl.addEventListener('pointerdown', e=>{ dragging=true; startA=pAng(e); startSteer=targetSteer; try{wheelEl.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
  wheelEl.addEventListener('pointermove', e=>{ if(!dragging) return; let d=pAng(e)-startA; if(d>Math.PI)d-=2*Math.PI; if(d<-Math.PI)d+=2*Math.PI; targetSteer=Math.max(-1,Math.min(1, startSteer + d/MAXA)); e.preventDefault(); });
  const endDrag=()=>{ if(dragging){ dragging=false; targetSteer=keySteer; } };
  wheelEl.addEventListener('pointerup', endDrag); wheelEl.addEventListener('pointercancel', endDrag);
  function pedal(id,k){ const el=ov.querySelector(id);
    const on=e=>{ e.preventDefault(); ctrl[k]=true; }, off=e=>{ e.preventDefault(); ctrl[k]=false; };
    el.addEventListener('pointerdown',on); el.addEventListener('pointerup',off); el.addEventListener('pointerleave',off); el.addEventListener('pointercancel',off);
  }
  pedal('#bG','gas'); pedal('#bB','brake');
  const kd=e=>{ if(e.key==='ArrowLeft'){keySteer=-1;if(!dragging)targetSteer=-1;} else if(e.key==='ArrowRight'){keySteer=1;if(!dragging)targetSteer=1;} else if(e.key==='ArrowUp')ctrl.gas=true; else if(e.key==='ArrowDown')ctrl.brake=true; };
  const ku=e=>{ if(e.key==='ArrowLeft'||e.key==='ArrowRight'){keySteer=0;if(!dragging)targetSteer=0;} else if(e.key==='ArrowUp')ctrl.gas=false; else if(e.key==='ArrowDown')ctrl.brake=false; };
  window.addEventListener('keydown',kd); window.addEventListener('keyup',ku);

  const PAL=['#ff7043','#ab47bc','#26a69a','#ec407a','#5c6bc0','#ffa726'];
  const g={ speed:0, max:14, px:0, steer:0, scroll:0, curve:0, curveT:0, curveTimer:2, dist:0, best:best0, obs:[], spawn:8, scen:[], scenSpawn:3, shake:0, inv:0 };
  let raf=0, running=false, last=0;

  function curveOffset(p){ return g.curve*(1-p)*(1-p)*W*0.55; }

  function start(){
    g.speed=0; g.px=0; g.steer=0; g.scroll=0; g.curve=0; g.curveT=0; g.curveTimer=2; g.dist=0; g.obs=[]; g.spawn=8; g.scen=[]; g.scenSpawn=3; g.shake=0; g.inv=0;
    targetSteer=0; keySteer=0; dragging=false;
    ov.querySelector('#gStart').style.display='none';
    running=true; last=performance.now(); raf=requestAnimationFrame(loop);
  }

  function update(dt){
    g.curveTimer-=dt;
    if(g.curveTimer<=0){ g.curveT=(Math.random()*2-1)*0.8; g.curveTimer=2.5+Math.random()*3; }
    g.curve += (g.curveT-g.curve)*Math.min(1,dt*1.1);

    if(ctrl.gas) g.speed+=9*dt; else g.speed-=3.5*dt;
    if(ctrl.brake) g.speed-=15*dt;
    g.speed=Math.max(0,Math.min(g.max,g.speed));

    g.steer += (targetSteer-g.steer)*Math.min(1,dt*9);
    g.px += g.steer*1.9*dt*(0.4+g.speed/g.max);
    g.px -= g.curve*g.speed*dt*0.05;
    if(Math.abs(g.px)>1){ g.speed*=Math.pow(0.2,dt); g.shake=Math.min(1,g.shake+dt*5); } else { g.shake=Math.max(0,g.shake-dt*4); }
    g.px=Math.max(-1.5,Math.min(1.5,g.px));

    g.scroll += g.speed*dt;
    g.dist += g.speed*dt*3;
    if(g.dist>g.best) g.best=g.dist;

    g.spawn -= g.speed*dt;
    if(g.spawn<=0){ g.spawn=7+Math.random()*7; const lanes=[-0.62,0,0.62]; g.obs.push({ z:60, x:lanes[Math.floor(Math.random()*3)], color:PAL[Math.floor(Math.random()*PAL.length)] }); }
    if(g.inv>0) g.inv-=dt;
    for(const o of g.obs) o.z -= g.speed*dt;
    for(const o of g.obs){ if(o.z<2 && o.z>0.4 && g.inv<=0 && Math.abs(o.x-g.px)<0.34){ g.speed*=0.3; g.shake=1; g.inv=1.0; } }
    g.obs=g.obs.filter(o=>o.z>0.4);
    // roadside scenery (for speed feel)
    g.scenSpawn -= g.speed*dt;
    if(g.scenSpawn<=0){ g.scenSpawn=1.6+Math.random()*1.6; const side=Math.random()<0.5?-1:1; g.scen.push({ z:60, side, kind:Math.random()<0.6?'tree':'pole' }); }
    for(const s of g.scen) s.z-=g.speed*dt;
    g.scen=g.scen.filter(s=>s.z>0.4);
  }

  function drawCar(x,y,w,color,tilt){
    const h=w*1.3; tilt=tilt||0;
    ctx.save(); ctx.translate(x,y); ctx.rotate(tilt); ctx.translate(-x,-y);
    ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(x,y,w*0.62,w*0.16,0,0,7); ctx.fill();
    ctx.fillStyle='#15171d'; ctx.fillRect(x-w*0.54,y-h*0.8,w*0.16,h*0.5); ctx.fillRect(x+w*0.38,y-h*0.8,w*0.16,h*0.5); // wheels
    rrect(x-w*0.45,y-h,w*0.9,h,w*0.2,color);                                  // body
    rrect(x-w*0.33,y-h*0.86,w*0.66,h*0.3,w*0.1,'rgba(185,228,255,.9)');       // windshield
    ctx.fillStyle='#fff6c8'; ctx.fillRect(x-w*0.4,y-h*0.1,w*0.15,h*0.07); ctx.fillRect(x+w*0.25,y-h*0.1,w*0.15,h*0.07); // lights
    ctx.restore();
  }
  function drawScene(s){
    if(s.z<0.4) return; const p=1/s.z; if(p<0.012) return;
    const half=ROADW*p; const cx=W/2+curveOffset(p)-g.px*half;
    const sx=cx + s.side*half*1.35; const sy=horizon+(H-horizon)*p;
    if(s.kind==='tree'){ const tw=Math.max(4,half*0.5); ctx.fillStyle='#7a4a22'; ctx.fillRect(sx-tw*0.12,sy-tw*0.7,tw*0.24,tw*0.7); ctx.fillStyle='#2e8b3d'; ctx.beginPath(); ctx.arc(sx,sy-tw*0.9,tw*0.6,0,7); ctx.fill(); ctx.fillStyle='#37a64a'; ctx.beginPath(); ctx.arc(sx-tw*0.2,sy-tw*1.1,tw*0.42,0,7); ctx.fill(); }
    else { const ph=Math.max(8,half*1.1); ctx.fillStyle='#b8c0cc'; ctx.fillRect(sx-Math.max(1,half*0.04),sy-ph,Math.max(2,half*0.08),ph); ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(sx,sy-ph,Math.max(3,half*0.13),0,7); ctx.fill(); }
  }
  function rrect(x,y,w,h,r,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.fill(); }

  function draw(){
    const shx = g.shake>0? (Math.random()*2-1)*9*g.shake : 0;
    ctx.save(); ctx.translate(shx,0);
    // sky
    const sky=ctx.createLinearGradient(0,0,0,horizon); sky.addColorStop(0,'#79c6ff'); sky.addColorStop(1,'#d8f0ff');
    ctx.fillStyle=sky; ctx.fillRect(-12,0,W+24,horizon+1);
    // road scanlines
    const denom=(H-horizon);
    for(let y=Math.floor(horizon); y<H; y++){
      const p=(y-horizon)/denom; if(p<=0.001) continue;
      const z=1/p;
      const half=ROADW*p;
      const cx=W/2+curveOffset(p)-g.px*half;
      const band=Math.floor((z*0.5 + g.scroll*0.5)); const even=(((band%2)+2)%2)===0;
      ctx.fillStyle= even? '#54b75a':'#469b4c'; ctx.fillRect(-12,y,W+24,1);          // grass
      ctx.fillStyle= even? '#70747f':'#686c77'; ctx.fillRect(cx-half,y,half*2,1);     // road
      const rw=Math.max(2,half*0.12); ctx.fillStyle= even?'#e7413a':'#f4f4f4';
      ctx.fillRect(cx-half,y,rw,1); ctx.fillRect(cx+half-rw,y,rw,1);                  // rumble
      if(even && half>26){ ctx.fillStyle='#f4d35e'; const cw=Math.max(2,half*0.05); ctx.fillRect(cx-cw/2,y,cw,1); } // center dash
    }
    // roadside scenery (far -> near)
    g.scen.slice().sort((a,b)=>b.z-a.z).forEach(drawScene);
    // obstacle cars (far -> near)
    g.obs.slice().sort((a,b)=>b.z-a.z).forEach(o=>{
      if(o.z<0.4) return; const p=1/o.z; if(p<0.015) return;
      const half=ROADW*p; const cx=W/2+curveOffset(p)-g.px*half;
      const ox=cx+o.x*half; const sy=horizon+denom*p;
      drawCar(ox, sy, Math.max(8, half*0.46), o.color, 0);
    });
    // player car (tilts with steering)
    drawCar(W/2 + (g.px*ROADW*0.05), H*0.92, ROADW*0.26, '#ffd54f', g.steer*0.18);
    // crash flash
    if(g.inv>0.78){ ctx.fillStyle='rgba(255,80,80,'+((g.inv-0.78)/0.22*0.4)+')'; ctx.fillRect(0,0,W,H); }
    ctx.restore();
  }

  function loop(t){
    if(!running) return;
    let dt=(t-last)/1000; last=t; if(dt>0.05) dt=0.05;
    update(dt); draw();
    wheelEl.style.transform='rotate('+(g.steer*MAXA)+'rad)';
    ov.querySelector('#hSpd').textContent=Math.round(g.speed*16);
    ov.querySelector('#hDist').textContent=Math.round(g.dist);
    ov.querySelector('#hBest').textContent=Math.round(g.best);
    raf=requestAnimationFrame(loop);
  }

  function close(){
    running=false; cancelAnimationFrame(raf);
    window.removeEventListener('resize',resize); window.removeEventListener('keydown',kd); window.removeEventListener('keyup',ku);
    try{ if(Math.round(g.best)>best0) localStorage.setItem('carBest', Math.round(g.best)); }catch(e){}
    ov.remove();
  }
  ov.querySelector('#gClose').onclick=close;
  ov.querySelector('#gStartBtn').onclick=start;
}

/* ---------- 설정 / 역할 ---------- */
function openSettings(){
  const role=getRole();
  const ov=makeOverlay(`
    <h2>⚙️ 설정</h2>
    <p>이 기기 모드: <b style="color:#2e5d9f;">${role==='admin'?'아빠 관리자':'아이(아들)'}</b></p>
    ${role==='admin'? '<button class="rolebtn kid" id="toKid">🧒 아이 모드로 바꾸기</button>'
                    : '<button class="rolebtn dad" id="toAdmin">👨‍👦 아빠 관리자 모드로 바꾸기</button>'}
    <button class="smallbtn" id="closeSet" style="width:100%; margin-top:4px;">닫기</button>`);
  ov.querySelector('#closeSet').onclick=()=>ov.remove();
  const tk=ov.querySelector('#toKid'); if(tk) tk.onclick=()=>{ setRole('kid'); ov.remove(); render(); };
  const ta=ov.querySelector('#toAdmin'); if(ta) ta.onclick=()=>{ ov.remove(); askPin(()=>{ setRole('admin'); render(); }); };
}
function askPin(onOk){
  const ov=makeOverlay(`
    <h2>🔒 비밀번호</h2><p>아빠 관리자 비밀번호 4자리</p>
    <input class="pininput" id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="pinCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="pinOk" style="flex:1;">확인</button>
    </div>`);
  const input=ov.querySelector('#pin'); setTimeout(()=>input.focus(),100);
  const submit=()=>{ if(input.value===String(CFG.adminPin)){ ov.remove(); onOk(); } else { input.value=''; input.placeholder='틀렸어요'; input.style.borderColor='#e57373'; } };
  ov.querySelector('#pinOk').onclick=submit;
  ov.querySelector('#pinCancel').onclick=()=>{ ov.remove(); render(); };
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
}
function chooseRole(){
  const ov=makeOverlay(`
    <h2>누구의 폰인가요?</h2><p>이 기기에서 사용할 모드를 골라주세요</p>
    <button class="rolebtn kid" id="pickKid">🧒 아이(아들) 폰</button>
    <button class="rolebtn dad" id="pickDad">👨‍👦 아빠(관리자) 폰</button>`, true);
  ov.querySelector('#pickKid').onclick=()=>{ setRole('kid'); ov.remove(); render(); };
  ov.querySelector('#pickDad').onclick=()=>{ ov.remove(); askPin(()=>{ setRole('admin'); render(); }); };
}

/* ---------- 공통 ---------- */
function makeOverlay(html, sticky){
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML='<div class="sheet">'+html+'</div>';
  if(!sticky) ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov); return ov;
}
function syncLabel(){
  if(!configFilled) return '⚠️ Firebase 미설정 — 이 기기에만 저장됩니다';
  return { connecting:'☁️ 연결 중…', ok:'✅ 실시간 동기화 켜짐', offline:'📴 오프라인 — 연결되면 자동 저장', error:'⚠️ 연결 오류' }[state.sync]||'';
}
function kidPickOverlay(sticky){
  const btns=KIDS.map(k=>`<button class="rolebtn" style="background:${k.color}; box-shadow:0 6px 0 ${k.sh};" data-kid="${k.id}">${k.avatar} ${k.name}</button>`).join('');
  const ov=makeOverlay(`<h2>누구야?</h2><p>이 폰에서 사용할 사람을 골라줘</p>${btns}${sticky?'':'<button class="smallbtn" id="kpClose" style="width:100%; margin-top:4px;">닫기</button>'}`, sticky);
  ov.querySelectorAll('[data-kid]').forEach(b=> b.onclick=()=>{ localStorage.setItem('milkKid', b.getAttribute('data-kid')); ov.remove(); render(); });
  const c=ov.querySelector('#kpClose'); if(c) c.onclick=()=>ov.remove();
}
function chooseKid(){ kidPickOverlay(true); }
function openKidSwitch(){ kidPickOverlay(false); }

function render(){
  if(!state.ready) return;
  if(!getRole()){ renderKid(); if(!document.querySelector('.overlay')) chooseRole(); return; }
  if(getRole()==='admin'){ renderAdmin(); return; }
  if(!localStorage.getItem('milkKid')){ renderKid(); if(!document.querySelector('.overlay')) chooseKid(); return; }
  renderKid();
}

/* ---------- 부팅 ---------- */
(function boot(){
  try { const s=JSON.parse(localStorage.getItem('milkData')||'null'); if(s&&s.missions) state.data=migrate(s); } catch(e){}
  state.ready=true;
  if(!initFirebase()) state.sync = configFilled?'error':'offline';
  render();
})();

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
</script>
