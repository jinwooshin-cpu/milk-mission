<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, onSnapshot, setDoc, getDoc,
  enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CFG = window.MILK_CONFIG;
const appEl = document.getElementById('app');

/* ---------- 로컬 설정(이 기기의 역할) ---------- */
const LS_ROLE = 'milkRole';        // 'kid' | 'admin'
function getRole(){ return localStorage.getItem(LS_ROLE); }
function setRole(r){ localStorage.setItem(LS_ROLE, r); }

/* ---------- 상태 ---------- */
const state = {
  data: { done:{}, reward: CFG.defaultReward, payouts:[] }, // 서버와 동기화되는 공유 데이터
  y: new Date().getFullYear(),
  m: new Date().getMonth(),
  confetti: [],
  justTapped: false,
  speechIdx: 0,
  sync: 'connecting',   // connecting | ok | offline | error
  ready: false
};

/* ---------- Firebase ---------- */
let db=null, docRef=null, writing=false;
const configFilled = CFG.firebase.apiKey && !CFG.firebase.apiKey.startsWith('여기에');

function initFirebase(){
  if(!configFilled) return false;
  try {
    const fbApp = initializeApp(CFG.firebase);
    db = getFirestore(fbApp);
    enableIndexedDbPersistence(db).catch(()=>{}); // 오프라인 캐시(여러 탭이면 실패 가능 — 무시)
    docRef = doc(db, 'families', CFG.familyCode);
    onSnapshot(docRef, (snap)=>{
      state.sync = 'ok';
      if(snap.exists()){
        const d = snap.data();
        state.data = {
          done: d.done || {},
          reward: (typeof d.reward==='number') ? d.reward : CFG.defaultReward,
          payouts: Array.isArray(d.payouts) ? d.payouts : []
        };
      } else {
        // 최초 1회 문서 생성
        save();
      }
      render();
    }, (err)=>{ state.sync='error'; console.error(err); render(); });
    return true;
  } catch(e){ console.error(e); state.sync='error'; return false; }
}

let saveTimer=null;
function save(){
  // 로컬 백업
  try { localStorage.setItem('milkMission', JSON.stringify(state.data.done)); } catch(e){}
  if(!docRef){ return; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    setDoc(docRef, state.data, { merge:true })
      .then(()=>{ if(state.sync!=='ok'){ state.sync='ok'; render(); } })
      .catch((e)=>{ state.sync='offline'; console.warn('저장 대기(오프라인):',e); render(); });
  }, 150);
}

/* ---------- 공통 로직 ---------- */
const WEEKDAYS = ['일','월','화','수','목','금','토'];
const SPEECHES = ['우유 최고야! 🐮','뼈가 튼튼해졌어!','오늘도 성공! 멋져!','꿀꺽꿀꺽 잘했어!','용돈 GET!','내일도 같이 하자!'];
const LEVEL_EMOJI = ['🐣','🐥','🐤','🐔','🦄','👑'];

function key(y,m,d){ return y + '-' + (m+1) + '-' + d; }
function monthPrefix(y,m){ return y + '-' + (m+1) + '-'; }

function toggle(y,m,d, celebrate){
  const k = key(y,m,d);
  const done = Object.assign({}, state.data.done);
  const turningOn = !done[k];
  if(done[k]) delete done[k]; else done[k]=true;
  state.data.done = done;
  save();
  if(turningOn && celebrate){
    fireConfetti();
    state.justTapped = true;
    state.speechIdx = Math.floor(Math.random()*SPEECHES.length);
    clearTimeout(window._jt);
    window._jt = setTimeout(()=>{ state.justTapped=false; render(); }, 900);
  }
  render();
}

function fireConfetti(){
  const colors = ['#ffd76b','#8fd694','#7fb0ff','#ff9bb3','#c9a0ff','#ffa94d'];
  const pieces=[];
  for(let i=0;i<26;i++){
    pieces.push('position:absolute; top:-10px; left:'+(5+Math.random()*90)+'%; width:11px; height:14px; background:'
      +colors[i%colors.length]+'; border-radius:2px; animation:confetti '+(1.1+Math.random()*0.9)+'s ease-in '+(Math.random()*0.25)+'s forwards;');
  }
  state.confetti = pieces;
  clearTimeout(window._ct);
  window._ct = setTimeout(()=>{ state.confetti=[]; render(); }, 2400);
}

function streakCount(){
  const done = state.data.done;
  let n=0; const t=new Date();
  for(let i=0;i<400;i++){
    const dt=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);
    if(done[key(dt.getFullYear(),dt.getMonth(),dt.getDate())]) n++;
    else { if(i===0) continue; break; }
  }
  return n;
}

function derive(){
  const { y,m } = state;
  const done = state.data.done;
  const reward = state.data.reward;
  const totalAll = Object.keys(done).length;
  const doneCount = Object.keys(done).filter(k=>k.startsWith(monthPrefix(y,m))).length;
  const money = doneCount * reward;
  const streak = streakCount();
  const level = Math.floor(totalAll/7)+1;
  const toNext = 7 - (totalAll%7);
  const progressPct = ((totalAll%7)/7)*100;
  const levelEmoji = LEVEL_EMOJI[Math.min(level-1, LEVEL_EMOJI.length-1)];
  const totalPaid = (state.data.payouts||[]).reduce((s,p)=>s+(Number(p.amount)||0),0);
  const totalEarned = totalAll * reward;
  const balance = totalEarned - totalPaid;
  return { totalAll, doneCount, money, streak, level, toNext, progressPct, levelEmoji, reward, totalPaid, totalEarned, balance };
}

function won(n){ return (Number(n)||0).toLocaleString('ko-KR') + '원'; }

/* ---------- 달력 셀 빌드 ---------- */
function buildCells(){
  const { y,m } = state;
  const done = state.data.done;
  const first = new Date(y,m,1).getDay();
  const daysIn = new Date(y,m+1,0).getDate();
  const today = new Date();
  const isThisMonth = today.getFullYear()===y && today.getMonth()===m;
  let html='';
  for(let i=0;i<first;i++) html += '<div style="min-height:46px;"></div>';
  for(let d=1; d<=daysIn; d++){
    const isDone = !!done[key(y,m,d)];
    const isToday = isThisMonth && today.getDate()===d;
    const bg = isDone ? 'background:#fff7d6; border:2px solid #ffd76b;'
                      : 'background:#f4f8ff; border:2px solid '+(isToday?'#7fb0ff':'transparent')+';';
    const numCol = isDone ? '#c79100' : '#5a7bab';
    const mark = isDone ? '<span style="font-size:18px; animation:pop .35s ease;">🥛</span>' : '';
    html += '<div class="cell" style="'+bg+'" data-d="'+d+'">'
          + '<span style="font-size:13px; color:'+numCol+'; font-weight:700;">'+d+'</span>'+mark+'</div>';
  }
  return html;
}

/* ---------- 화면: 아들 모드 ---------- */
function renderKid(){

  const cowFace = todayDone ? '🐮' : '🐄';

  const speech = state.justTapped ? SPEECHES[state.speechIdx]
               : todayDone ? '오늘 미션 완료! 내일 또 보자 😊'
               : '오늘 저녁 우유 마셨어? 버튼을 눌러줘!';
  const tapLabel = todayDone ? '✓ 오늘 완료!' : '🥛 우유 마셨어요!';
  const tapStyle = 'border:none; cursor:pointer; font-family:Jua,sans-serif; font-size:24px; padding:16px 28px; border-radius:20px; color:#fff; width:100%;'
    + (todayDone ? 'background:#8fd694; box-shadow:0 5px 0 #6cbf73;' : 'background:#ffb43d; box-shadow:0 6px 0 #e8920a;');

  const confettiHtml = state.confetti.map(s=>'<div style="'+s+'"></div>').join('');

  appEl.innerHTML = `
  <div class="wrap">
    <button class="gear" id="gear" aria-label="설정">⚙️</button>
    <div class="confetti-wrap">${confettiHtml}</div>
    <h1 class="title">🥛 우유 미션 게임</h1>

    <div class="card hero">
      <div style="font-size:84px; line-height:1; animation:${cowAnim};">${cowFace}</div>
      <div style="font-size:22px; color:#6b8cba; margin:6px 0 14px; min-height:28px;">${speech}</div>
      <button id="tapToday" style="${tapStyle}">${tapLabel}</button>

      <div style="margin-top:20px; background:#ecfaee; border:3px solid #8fd694; border-radius:20px; padding:14px;">
        <div style="font-size:18px; color:#3a8f43;">🐷 저금통</div>
        <div style="font-family:Jua,sans-serif; font-size:40px; color:#2e9e3a;">${won(v.money)}</div>
        <div style="font-size:16px; color:#6cbf73;">이번 달 ${v.doneCount}일 성공 · 한 잔 ${won(v.reward)}</div>
      </div>

      <div style="display:flex; gap:10px; margin-top:14px;">
        <div style="flex:1; background:#fff3e0; border:3px solid #ffc266; border-radius:16px; padding:10px;">
          <div style="font-size:30px;">🔥</div>
          <div style="font-family:Jua,sans-serif; font-size:24px; color:#e8820a;">${v.streak}일 연속</div>
        </div>
        <div style="flex:1; background:#eef3ff; border:3px solid #9db8f0; border-radius:16px; padding:10px;">
          <div style="font-size:30px;">${v.levelEmoji}</div>
          <div style="font-family:Jua,sans-serif; font-size:24px; color:#3a5fb0;">Lv.${v.level}</div>
        </div>
      </div>
      <div style="margin-top:12px; text-align:left;">
        <div style="font-size:15px; color:#9bb3d4; margin-bottom:4px;">다음 레벨까지 ${v.toNext}잔</div>
        <div style="background:#eaf1fb; border-radius:99px; height:16px; overflow:hidden;">
          <div style="height:100%; width:${v.progressPct}%; background:linear-gradient(90deg,#8fd694,#5fc46c); border-radius:99px; transition:width .4s ease;"></div>
        </div>
      </div>
    </div>

    <div class="card calcard">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <button class="arrow" id="prev">‹</button>
        <div style="font-family:Jua,sans-serif; font-size:22px; color:#2e5d9f;">${state.y}년 ${state.m+1}월</div>
        <button class="arrow" id="next">›</button>
      </div>
      <div class="grid7" style="margin-bottom:5px;">
        ${WEEKDAYS.map(w=>'<div style="text-align:center; font-size:14px; color:#9bb3d4; font-weight:700;">'+w+'</div>').join('')}
      </div>
      <div class="grid7" id="cells">${buildCells()}</div>
    </div>

    <div class="statusbar">${syncLabel()}</div>
  </div>`;

  // 이벤트
  document.getElementById('gear').onclick = openSettings;
  document.getElementById('tapToday').onclick = ()=>{
    if(!isThisMonth){ const n=new Date(); state.y=n.getFullYear(); state.m=n.getMonth(); }
    const n=new Date();
    toggle(n.getFullYear(), n.getMonth(), n.getDate(), true);
  };
  document.getElementById('prev').onclick = ()=>{ shiftMonth(-1); };
  document.getElementById('next').onclick = ()=>{ shiftMonth(1); };
  bindCells();
}

      </div>

      <div style="background:#f3fff4; border:2px solid #cdeccf; border-radius:18px; padding:14px; margin-bottom:6px;">
        <div style="display:flex; justify-content:space-between; font-size:17px; margin-bottom:4px;"><span style="color:#3a8f43;">총 적립(전체)</span><b style="color:#2e9e3a;">${won(v.totalEarned)}</b></div>
        <div style="display:flex; justify-content:space-between; font-size:17px; margin-bottom:4px;"><span style="color:#3a8f43;">총 지급</span><b style="color:#c0392b;">${won(v.totalPaid)}</b></div>
        <hr style="border:none; border-top:1px dashed #cdeccf; margin:8px 0;">
        <div style="display:flex; justify-content:space-between; font-size:20px;"><span style="color:#2e5d9f;">미지급 잔액</span><b style="font-family:Jua,sans-serif; color:#2e5d9f;">${won(v.balance)}</b></div>
        <button class="paybtn" id="payBtn" style="margin-top:12px;">💸 지금 정산하기</button>
        <div id="payList">${renderPayList()}</div>
      </div>
    </div>

    <div class="card calcard">
      <div style="font-size:15px; color:#9bb3d4; text-align:center; margin-bottom:8px;">날짜를 눌러 체크를 수정/승인할 수 있어요</div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <button class="arrow" id="prev">‹</button>
        <div style="font-family:Jua,sans-serif; font-size:22px; color:#2e5d9f;">${state.y}년 ${state.m+1}월</div>
        <button class="arrow" id="next">›</button>
      </div>
      <div class="grid7" style="margin-bottom:5px;">
        ${WEEKDAYS.map(w=>'<div style="text-align:center; font-size:14px; color:#9bb3d4; font-weight:700;">'+w+'</div>').join('')}
      </div>
      <div class="grid7" id="cells">${buildCells()}</div>
      <button class="linkbtn" id="resetMonth" style="display:block; margin:14px auto 0;">이번 달 기록 지우기</button>
    </div>

    <div class="statusbar">${syncLabel()} · 방코드: ${CFG.familyCode}</div>
  </div>`;

  document.getElementById('gear').onclick = openSettings;
  document.getElementById('prev').onclick = ()=>{ shiftMonth(-1); };
  document.getElementById('next').onclick = ()=>{ shiftMonth(1); };
  document.getElementById('rMinus').onclick = ()=>changeReward(-100);
  document.getElementById('rPlus').onclick = ()=>changeReward(100);
  document.getElementById('payBtn').onclick = openPayout;
  document.getElementById('resetMonth').onclick = resetMonth;
  bindCells();
  document.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick = ()=>deletePayout(b.getAttribute('data-del'));
  });
}

function renderPayList(){
  const ps = (state.data.payouts||[]).slice().sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  if(!ps.length) return '<div style="font-size:14px; color:#9bb3d4; text-align:center; margin-top:8px;">아직 지급 기록이 없어요</div>';
  return ps.map(p=>`<div class="payitem">
      <span>📅 ${p.date||''} · <b>${won(p.amount)}</b>${p.note?' · '+escapeHtml(p.note):''}</span>
      <button class="delx" data-del="${p.id}">✕</button>
    </div>`).join('');
}

/* ---------- 액션 ---------- */
function shiftMonth(delta){
  let nm=state.m+delta, ny=state.y;
  if(nm<0){ nm=11; ny--; } if(nm>11){ nm=0; ny++; }
  state.y=ny; state.m=nm; render();
}
function bindCells(){
  document.querySelectorAll('#cells .cell').forEach(c=>{
    const d = parseInt(c.getAttribute('data-d'),10);
    c.onclick = ()=> toggle(state.y, state.m, d, getRole()==='kid');
  });
}
function changeReward(delta){
  let r = (state.data.reward||CFG.defaultReward) + delta;
  r = Math.max(100, Math.min(5000, r));
  state.data.reward = r; save(); render();
}
function resetMonth(){
  if(!confirm(state.y+'년 '+(state.m+1)+'월 기록을 모두 지울까요?')) return;
  const done = Object.assign({}, state.data.done);
  const pre = monthPrefix(state.y, state.m);
  Object.keys(done).forEach(k=>{ if(k.startsWith(pre)) delete done[k]; });
  state.data.done = done; save(); render();
}
function deletePayout(id){
  state.data.payouts = (state.data.payouts||[]).filter(p=>p.id!==id);
  save(); render();
}

/* ---------- 오버레이: 정산 입력 ---------- */
function openPayout(){
  const v = derive();
  const todayStr = new Date().toISOString().slice(0,10);
  const ov = makeOverlay(`
    <h2>💸 정산하기</h2>
    <p>아이에게 준 용돈을 기록해요</p>
    <input class="field" id="payAmt" type="number" inputmode="numeric" placeholder="금액(원)" value="${v.balance>0?v.balance:''}">
    <input class="field" id="payDate" type="date" value="${todayStr}">
    <input class="field" id="payNote" placeholder="메모 (선택) 예: 6월 용돈 지급">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="payCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="paySave" style="flex:1;">기록하기</button>
    </div>
  `);
  ov.querySelector('#payCancel').onclick = ()=>ov.remove();
  ov.querySelector('#paySave').onclick = ()=>{
    const amt = Math.round(Number(ov.querySelector('#payAmt').value)||0);
    if(amt<=0){ alert('금액을 입력해 주세요'); return; }
    const rec = { id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
                  amount: amt, date: ov.querySelector('#payDate').value || todayStr,
                  note: ov.querySelector('#payNote').value.trim() };
    state.data.payouts = (state.data.payouts||[]).concat([rec]);
    save(); ov.remove(); render();
  };
}

/* ---------- 오버레이: 설정 / 역할 ---------- */
function openSettings(){
  const role = getRole();
  const ov = makeOverlay(`
    <h2>⚙️ 설정</h2>
    <p>이 기기 모드: <b style="color:#2e5d9f;">${role==='admin'?'아빠 관리자':'아들(아이)'}</b></p>
    ${role==='admin'
      ? '<button class="rolebtn kid" id="toKid">🧒 아이 모드로 바꾸기</button>'
      : '<button class="rolebtn dad" id="toAdmin">👨‍👦 아빠 관리자 모드로 바꾸기</button>'}
    <button class="smallbtn" id="closeSet" style="width:100%; margin-top:4px;">닫기</button>
  `);
  ov.querySelector('#closeSet').onclick = ()=>ov.remove();
  const toKid = ov.querySelector('#toKid');
  if(toKid) toKid.onclick = ()=>{ setRole('kid'); ov.remove(); render(); };
  const toAdmin = ov.querySelector('#toAdmin');
  if(toAdmin) toAdmin.onclick = ()=>{ ov.remove(); askPin(()=>{ setRole('admin'); render(); }); };
}

function askPin(onOk){
  const ov = makeOverlay(`
    <h2>🔒 비밀번호</h2>
    <p>아빠 관리자 비밀번호 4자리</p>
    <input class="pininput" id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="pinCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="pinOk" style="flex:1;">확인</button>
    </div>
  `);
  const input = ov.querySelector('#pin');
  setTimeout(()=>input.focus(), 100);
  const submit = ()=>{
    if(input.value === String(CFG.adminPin)){ ov.remove(); onOk(); }
    else { input.value=''; input.placeholder='틀렸어요'; input.style.borderColor='#e57373'; }
  };
  ov.querySelector('#pinOk').onclick = submit;
  ov.querySelector('#pinCancel').onclick = ()=>{ ov.remove(); render(); };
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
}

/* 최초 역할 선택 */
function chooseRole(){
  const ov = makeOverlay(`
    <h2>누구의 폰인가요?</h2>
    <p>이 기기에서 사용할 모드를 골라주세요</p>
    <button class="rolebtn kid" id="pickKid">🧒 아이(아들) 폰</button>
    <button class="rolebtn dad" id="pickDad">👨‍👦 아빠(관리자) 폰</button>
  `, true);
  ov.querySelector('#pickKid').onclick = ()=>{ setRole('kid'); ov.remove(); render(); };
  ov.querySelector('#pickDad').onclick = ()=>{ ov.remove(); askPin(()=>{ setRole('admin'); render(); }); };
}

/* ---------- 오버레이 유틸 ---------- */
function makeOverlay(innerHtml, sticky){
  const ov = document.createElement('div');
  ov.className='overlay';
  ov.innerHTML = '<div class="sheet">'+innerHtml+'</div>';
  if(!sticky){ ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); }); }
  document.body.appendChild(ov);
  return ov;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function syncLabel(){
  if(!configFilled) return '⚠️ Firebase 미설정 — 이 기기에만 저장됩니다 (배포가이드 참고)';
  return { connecting:'☁️ 연결 중…', ok:'✅ 실시간 동기화 켜짐', offline:'📴 오프라인 — 연결되면 자동 저장', error:'⚠️ 연결 오류' }[state.sync] || '';
}

/* ---------- 렌더 ---------- */
function render(){
  if(!state.ready){ return; }
  if(!getRole()){ // 역할 미선택 → 선택 화면(배경은 아들 모드)
    renderKid();
    if(!document.querySelector('.overlay')) chooseRole();
    return;
  }
  if(getRole()==='admin') renderAdmin(); else renderKid();
}

/* ---------- 부팅 ---------- */
(function boot(){
  // 로컬 백업 먼저 로드(오프라인/미설정 대비)
  try {
    const saved = JSON.parse(localStorage.getItem('milkMission')||'null');
    if(saved && typeof saved==='object') state.data.done = saved;
  } catch(e){}
  state.ready = true;
  const ok = initFirebase();
  if(!ok){ state.sync = configFilled?'error':'offline'; }
  render();
})();

// 서비스워커 등록(홈화면 추가/오프라인)
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
