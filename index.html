  .rolebtn { display:block; width:100%; border:none; border-radius:18px; padding:18px; font-family:'Jua',sans-serif; font-size:22px; color:#fff; cursor:pointer; margin-bottom:12px; }
  .rolebtn.kid { background:#ffb43d; box-shadow:0 6px 0 #e8920a; }
  .rolebtn.dad { background:#5fa0e8; box-shadow:0 6px 0 #3a78c2; }
  .pininput { font-family:'Jua',sans-serif; font-size:30px; text-align:center; letter-spacing:10px; width:100%; padding:14px; border:3px solid #cfe0f5; border-radius:16px; margin-bottom:14px; color:#2e5d9f; }
  .field { width:100%; padding:12px; border:3px solid #cfe0f5; border-radius:14px; font-family:'Gaegu',sans-serif; font-size:18px; margin-bottom:10px; }

  .ledrow { display:flex; justify-content:space-between; align-items:center; padding:9px 12px; border-radius:12px; margin-top:7px; background:#f7faff; font-size:15px; }
  .ledrow .amt.in { color:#2e9e3a; font-family:'Jua',sans-serif; }
  .ledrow .amt.out { color:#d35400; font-family:'Jua',sans-serif; }
  .delx { border:none; background:#ffe2e2; color:#d35; border-radius:10px; width:28px; height:28px; cursor:pointer; font-size:14px; }
  .editx { border:none; background:#e7f0ff; color:#3a78c2; border-radius:10px; width:28px; height:28px; cursor:pointer; font-size:14px; margin-right:5px; }
  .seg { display:flex; gap:8px; margin-bottom:12px; }

  .seg button.sel-in { background:#eaf7ec; border-color:#8fd694; color:#2e9e3a; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, enableIndexedDbPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CFG = window.MILK_CONFIG;
const appEl = document.getElementById('app');

const DEFAULT_MISSIONS = [
  { id:'milk',    emoji:'🥛', name:'우유 마시기', reward:500 },
  { id:'walk',    emoji:'🐕', name:'쿠키 산책',   reward:1000 },
  { id:'recycle', emoji:'♻️', name:'분리수거',    reward:300 }
];

const LS_ROLE = 'milkRole';
const getRole = ()=> localStorage.getItem(LS_ROLE);
const setRole = (r)=> localStorage.setItem(LS_ROLE, r);

const state = {
  data: { missions: DEFAULT_MISSIONS.slice(), done:{}, ledger:[] },
  y: new Date().getFullYear(),
  m: new Date().getMonth(),
  confetti: [], justTapped:false, cheer:'',
  sync:'connecting', ready:false
};

/* ---------- Firebase ---------- */
let db=null, docRef=null;
const configFilled = CFG.firebase.apiKey && !CFG.firebase.apiKey.startsWith('여기에');

function migrate(d){
  // done: {date:true}(옛 우유전용) -> {date:[ids]}
  const done = {};
  const raw = d.done || {};
  Object.keys(raw).forEach(k=>{
    const v = raw[k];
    if (v === true) done[k] = ['milk'];
    else if (Array.isArray(v)) done[k] = v.slice();
    else if (v && typeof v === 'object') done[k] = Object.keys(v).filter(x=>v[x]); // {milk:true}
  });
  let missions = Array.isArray(d.missions) && d.missions.length ? d.missions : DEFAULT_MISSIONS.slice();
  let ledger = Array.isArray(d.ledger) ? d.ledger : [];
  // 옛 payouts(지급) -> 지출 항목으로 흡수
  if (Array.isArray(d.payouts)) {
    d.payouts.forEach(p=> ledger.push({ id:p.id||rid(), date:p.date, type:'out', amount:p.amount, note:p.note||'지급' }));
  }
  return { missions, done, ledger };
}

function initFirebase(){
  if(!configFilled) return false;
  try {
    const fbApp = initializeApp(CFG.firebase);
    db = getFirestore(fbApp);
    enableIndexedDbPersistence(db).catch(()=>{});
    docRef = doc(db, 'families', CFG.familyCode);
    onSnapshot(docRef, (snap)=>{
      state.sync='ok';
      if(snap.exists()){ state.data = migrate(snap.data()); }
      else { save(); }
      render();
    }, (err)=>{ state.sync='error'; console.error(err); render(); });
    return true;
  } catch(e){ console.error(e); state.sync='error'; return false; }
}

let saveTimer=null;
function save(){
  try { localStorage.setItem('milkData', JSON.stringify(state.data)); } catch(e){}
  if(!docRef) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    setDoc(docRef, state.data, { merge:false })
      .then(()=>{ if(state.sync!=='ok'){ state.sync='ok'; render(); } })
      .catch((e)=>{ state.sync='offline'; console.warn('오프라인 저장 대기:',e); render(); });
  }, 150);
}

/* ---------- 유틸 ---------- */
const WEEKDAYS = ['일','월','화','수','목','금','토'];
const rid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const key = (y,m,d)=> y+'-'+(m+1)+'-'+d;
const won = (n)=> (Number(n)||0).toLocaleString('ko-KR')+'원';
const esc = (s)=> String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const missionById = (id)=> state.data.missions.find(m=>m.id===id);
const doneIds = (y,m,d)=> state.data.done[key(y,m,d)] || [];

function toggleMission(y,m,d,mid,celebrate){
  const k = key(y,m,d);
  const arr = (state.data.done[k]||[]).slice();
  const i = arr.indexOf(mid);
  const turningOn = i<0;
  if(turningOn) arr.push(mid); else arr.splice(i,1);
  if(arr.length) state.data.done[k]=arr; else delete state.data.done[k];
  save();
  if(turningOn && celebrate){
    fireConfetti();
    const mn = (missionById(mid)||{}).name || '';
    const cheers = ['최고야! 🎉', mn+' 완료! 멋져!', '오늘도 성공!', '잘했어! 👏', '용돈 GET! 💰', '내일도 같이 하자!'];
    state.cheer = cheers[Math.floor(Math.random()*cheers.length)];
    state.justTapped = true;
    clearTimeout(window._jt);
    window._jt = setTimeout(()=>{ state.justTapped=false; render(); }, 1000);
  }
  render();
}

function fireConfetti(){
  const colors=['#ffd76b','#8fd694','#7fb0ff','#ff9bb3','#c9a0ff','#ffa94d'];
  const pieces=[];
  for(let i=0;i<26;i++){
    pieces.push('position:absolute; top:-10px; left:'+(5+Math.random()*90)+'%; width:11px; height:14px; background:'
      +colors[i%colors.length]+'; border-radius:2px; animation:confetti '+(1.1+Math.random()*0.9)+'s ease-in '+(Math.random()*0.25)+'s forwards;');
  }
  state.confetti=pieces;
  clearTimeout(window._ct);
  window._ct=setTimeout(()=>{ state.confetti=[]; render(); },2400);
}

/* ---------- 파생값 ---------- */
function derive(){
  const { y,m } = state, done=state.data.done;
  let totalCompletions=0, totalEarned=0, monthEarned=0, monthCount=0;
  Object.keys(done).forEach(k=>{
    const isMonth = k.startsWith(y+'-'+(m+1)+'-');
    done[k].forEach(mid=>{
      const mm = missionById(mid); const rew = mm? (Number(mm.reward)||0):0;
      totalCompletions++; totalEarned+=rew;
      if(isMonth){ monthEarned+=rew; monthCount++; }
    });
  });
  const ledIn  = state.data.ledger.filter(e=>e.type==='in').reduce((s,e)=>s+(Number(e.amount)||0),0);
  const ledOut = state.data.ledger.filter(e=>e.type==='out').reduce((s,e)=>s+(Number(e.amount)||0),0);
  const totalIn = totalEarned + ledIn;
  const balance = totalIn - ledOut;
  // streak: 하루에 1개 이상 완료한 날의 연속(오늘 또는 어제 기준)
  let streak=0; const t=new Date();
  for(let i=0;i<400;i++){
    const dt=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);
    if((done[key(dt.getFullYear(),dt.getMonth(),dt.getDate())]||[]).length) streak++;
    else { if(i===0) continue; break; }
  }
  const level = Math.floor(totalCompletions/7)+1;
  const toNext = 7-(totalCompletions%7);
  const progressPct = ((totalCompletions%7)/7)*100;
  const levelEmoji = ['🐣','🐥','🐤','🐔','🦄','👑'][Math.min(level-1,5)];
  return { totalCompletions, totalEarned, monthEarned, monthCount, ledIn, ledOut, totalIn, balance, streak, level, toNext, progressPct, levelEmoji };
}

/* ---------- 통합 용돈기입장(자동 미션수입 + 수동 항목) ---------- */
function buildLedger(){
  const rows=[];
  Object.keys(state.data.done).forEach(k=>{
    const ids=state.data.done[k];
    const amt=ids.reduce((s,mid)=>{ const mm=missionById(mid); return s+(mm?(Number(mm.reward)||0):0); },0);
    if(amt>0){
      const names=ids.map(mid=>(missionById(mid)||{}).emoji||'•').join(' ');
      rows.push({ date:k, type:'in', amount:amt, note:'미션 '+ids.length+'개 '+names, auto:true });
    }
  });
  state.data.ledger.forEach(e=> rows.push(Object.assign({}, e)));
  // 날짜 정렬용 키
  const dkey=(s)=>{ const [y,mo,d]=s.split('-').map(Number); return y*10000+mo*100+d; };
  rows.sort((a,b)=> dkey(a.date)-dkey(b.date) || (a.auto?-1:1));
  let run=0; rows.forEach(r=>{ run += r.type==='in'? r.amount : -r.amount; r.bal=run; });
  return rows;
}

/* ---------- 달력 ---------- */
function buildCells(){
  const { y,m }=state; const done=state.data.done;
  const first=new Date(y,m,1).getDay(); const daysIn=new Date(y,m+1,0).getDate();
  const today=new Date(); const isThisMonth=today.getFullYear()===y&&today.getMonth()===m;
  let html='';
  for(let i=0;i<first;i++) html+='<div style="min-height:46px;"></div>';
  for(let d=1;d<=daysIn;d++){
    const ids=doneIds(y,m,d); const n=ids.length;
    const isToday=isThisMonth&&today.getDate()===d;
    const bg = n? 'background:#fff7d6; border:2px solid #ffd76b;' : 'background:#f4f8ff; border:2px solid '+(isToday?'#7fb0ff':'transparent')+';';
    const numCol = n? '#c79100':'#5a7bab';
    const mark = n? '<span style="font-size:12px; animation:pop .35s ease;">⭐'+n+'</span>' : '';
    html+='<div class="cell" style="'+bg+'" data-d="'+d+'"><span style="font-size:13px; color:'+numCol+'; font-weight:700;">'+d+'</span>'+mark+'</div>';
  }
  return html;
}
function bindCells(){
  document.querySelectorAll('#cells .cell').forEach(c=>{
    const d=parseInt(c.getAttribute('data-d'),10);
    c.onclick=()=> openDay(state.y, state.m, d);
  });
}

/* ---------- 아이 모드 ---------- */
function renderKid(){
  const v=derive();
  const today=new Date();
  const ty=today.getFullYear(), tm=today.getMonth(), td=today.getDate();
  const todayIds=doneIds(ty,tm,td);
  const total=state.data.missions.length;
  const allDone= total>0 && todayIds.length>=total;
  const face= allDone? '🐮':'🐄';
  const anim= state.justTapped? 'wiggle .6s ease':'float 3s ease-in-out infinite';
  const speech= state.justTapped? state.cheer
              : allDone? '오늘 미션 전부 완료! 최고야 😊'
              : todayIds.length? '잘하고 있어! 남은 미션도 도전! 💪'
              : '오늘의 미션을 시작해볼까? 👇';

  const missionHtml = state.data.missions.map(mm=>{
    const on=todayIds.includes(mm.id);
    return `<div class="mrow ${on?'on':''}">
      <span class="memoji">${mm.emoji||'⭐'}</span>
      <div style="flex:1; text-align:left;">
        <div class="mname">${esc(mm.name)}</div>
        <div class="mrew">${won(mm.reward)}</div>
      </div>
      <button class="mbtn ${on?'done':'do'}" data-mid="${mm.id}">${on?'✓ 완료':'하기'}</button>
    </div>`;
  }).join('') || '<p style="color:#9bb3d4;">미션이 없어요. 아빠가 추가해줄 거예요!</p>';

  const led=buildLedger().slice(-3).reverse();
  const ledHtml = led.length? led.map(r=>`<div class="ledrow">
      <span>${r.date.split('-').slice(1).join('/')} · ${esc(r.note||(r.type==='in'?'수입':'지출'))}</span>
      <span class="amt ${r.type}">${r.type==='in'?'+':'−'}${won(r.amount)}</span>
    </div>`).join('') : '<div style="font-size:14px;color:#9bb3d4;text-align:center;margin-top:6px;">아직 기록이 없어요</div>';

  const confettiHtml=state.confetti.map(s=>'<div style="'+s+'"></div>').join('');

  appEl.innerHTML = `
  <div class="wrap">
    <button class="gear" id="gear">⚙️</button>
    <div class="confetti-wrap">${confettiHtml}</div>
    <h1 class="title">🏆 우리집 미션 게임</h1>
    <p class="subtitle">미션 하고 용돈 모으기 🐮</p>

    <div class="card hero">
      <div style="font-size:78px; line-height:1; animation:${anim};">${face}</div>
      <div style="font-size:21px; color:#6b8cba; margin:4px 0 14px; min-height:26px;">${speech}</div>
      <div style="text-align:left;">${missionHtml}</div>

      <div style="margin-top:14px; background:#ecfaee; border:3px solid #8fd694; border-radius:20px; padding:14px;">
        <div style="font-size:18px; color:#3a8f43;">🐷 저금통 (모은 돈)</div>
        <div style="font-family:Jua,sans-serif; font-size:40px; color:#2e9e3a;">${won(v.balance)}</div>
        <div style="font-size:15px; color:#6cbf73;">이번 달 ${won(v.monthEarned)} 적립 · 지금까지 쓴 돈 ${won(v.ledOut)}</div>
      </div>

      <div class="twobox">
        <div class="bbox" style="background:#fff3e0; border:3px solid #ffc266;">
          <div style="font-size:28px;">🔥</div>
          <div style="font-family:Jua,sans-serif; font-size:22px; color:#e8820a;">${v.streak}일 연속</div>
        </div>
        <div class="bbox" style="background:#eef3ff; border:3px solid #9db8f0;">
          <div style="font-size:28px;">${v.levelEmoji}</div>
          <div style="font-family:Jua,sans-serif; font-size:22px; color:#3a5fb0;">Lv.${v.level}</div>
        </div>
      </div>
      <div style="margin-top:12px; text-align:left;">
        <div style="font-size:15px; color:#9bb3d4; margin-bottom:4px;">다음 레벨까지 ${v.toNext}개</div>
        <div style="background:#eaf1fb; border-radius:99px; height:16px; overflow:hidden;">
          <div style="height:100%; width:${v.progressPct}%; background:linear-gradient(90deg,#8fd694,#5fc46c); border-radius:99px; transition:width .4s ease;"></div>
        </div>
      </div>

      <button class="bigbtn" id="spendBtn" style="margin-top:16px; background:#ff9bb3; box-shadow:0 5px 0 #e87a95;">🛒 오늘 뭐 샀어요?</button>
    </div>

    <div class="card sec">
      <div class="sec-title">📒 용돈기입장</div>
      ${ledHtml}
    </div>

    <div class="card sec">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <button class="arrow" id="prev">‹</button>
        <div style="font-family:Jua,sans-serif; font-size:20px; color:#2e5d9f;">${state.y}년 ${state.m+1}월</div>
        <button class="arrow" id="next">›</button>
      </div>
      <div class="grid7" style="margin-bottom:5px;">
        ${WEEKDAYS.map(w=>'<div style="text-align:center; font-size:14px; color:#9bb3d4; font-weight:700;">'+w+'</div>').join('')}
      </div>
      <div class="grid7" id="cells">${buildCells()}</div>
    </div>

    <div class="statusbar">${syncLabel()}</div>
  </div>`;

  document.getElementById('gear').onclick=openSettings;
  document.getElementById('prev').onclick=()=>shiftMonth(-1);
  document.getElementById('next').onclick=()=>shiftMonth(1);
  document.getElementById('spendBtn').onclick=()=>openEntry('out', true);
  document.querySelectorAll('.mbtn').forEach(b=>{
    b.onclick=()=>{ const n=new Date(); toggleMission(n.getFullYear(),n.getMonth(),n.getDate(), b.getAttribute('data-mid'), true); };
  });
  bindCells();
}

/* ---------- 아빠 관리자 모드 ---------- */

  const missionHtml = state.data.missions.map(mm=>`<div class="mrow">

        <div class="mname">${esc(mm.name)}</div>

      <span style="display:flex; align-items:center; gap:6px;">
        <span class="amt ${r.type}">${r.type==='in'?'+':'−'}${won(r.amount)}</span>

      </span>
    </div>`).join('') : '<div style="font-size:14px;color:#9bb3d4;text-align:center;margin-top:6px;">아직 기록이 없어요</div>';

  <div class="wrap">
    <button class="gear" id="gear">⚙️</button>
    <div class="adminbadge">👨‍👦 아빠 관리자 모드</div>
    <h1 class="title">우리집 미션 현황</h1>

    <div class="card hero" style="text-align:left;">
      <div class="statgrid">
        <div class="statbox" style="background:#fff7d6; border:2px solid #ffd76b;"><div class="lab" style="color:#b8860b;">이번 달 적립</div><div class="val" style="color:#e8a300;">${won(v.monthEarned)}</div></div>
        <div class="statbox" style="background:#ecfaee; border:2px solid #8fd694;"><div class="lab" style="color:#3a8f43;">저금통 잔액</div><div class="val" style="color:#2e9e3a;">${won(v.balance)}</div></div>
        <div class="statbox" style="background:#fff3e0; border:2px solid #ffc266;"><div class="lab" style="color:#c9740a;">🔥 연속</div><div class="val" style="color:#e8820a;">${v.streak}일</div></div>
        <div class="statbox" style="background:#eef3ff; border:2px solid #9db8f0;"><div class="lab" style="color:#3a5fb0;">레벨</div><div class="val" style="color:#3a5fb0;">${v.levelEmoji} Lv.${v.level}</div></div>
      </div>
      <div style="background:#f3fff4; border:2px solid #cdeccf; border-radius:16px; padding:12px;">
        <div style="display:flex; justify-content:space-between; font-size:16px; margin-bottom:3px;"><span style="color:#3a8f43;">총 수입</span><b style="color:#2e9e3a;">${won(v.totalIn)}</b></div>
        <div style="display:flex; justify-content:space-between; font-size:16px;"><span style="color:#d35400;">총 지출</span><b style="color:#d35400;">${won(v.ledOut)}</b></div>
      </div>
    </div>

    <div class="card sec">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="sec-title" style="margin:0;">🎯 미션 관리</div>
        <button class="smallbtn primary" id="addMission">+ 미션 추가</button>
      </div>
      <div style="margin-top:12px;">${missionHtml}</div>
    </div>

    <div class="card sec">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="sec-title" style="margin:0;">📒 용돈기입장</div>
        <span>
          <button class="smallbtn" id="addIn" style="color:#2e9e3a;">+ 수입</button>
          <button class="smallbtn" id="addOut" style="color:#d35400;">− 지출</button>
        </span>
      </div>
      <div style="margin-top:12px;">${ledHtml}</div>

    <div class="card sec">
      <div style="font-size:14px; color:#9bb3d4; text-align:center; margin-bottom:8px;">날짜를 눌러 미션 체크를 수정/승인할 수 있어요</div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <button class="arrow" id="prev">‹</button>
        <div style="font-family:Jua,sans-serif; font-size:20px; color:#2e5d9f;">${state.y}년 ${state.m+1}월</div>
        <button class="arrow" id="next">›</button>
      </div>
      <div class="grid7" style="margin-bottom:5px;">

  document.getElementById('gear').onclick=openSettings;

  document.getElementById('addIn').onclick=()=>openEntry('in', false);
  document.getElementById('addOut').onclick=()=>openEntry('out', false);
  document.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>openMission(b.getAttribute('data-edit')));
  document.querySelectorAll('[data-delm]').forEach(b=> b.onclick=()=>deleteMission(b.getAttribute('data-delm')));
  document.querySelectorAll('[data-dele]').forEach(b=> b.onclick=()=>deleteEntry(b.getAttribute('data-dele')));

/* ---------- 액션 ---------- */
function shiftMonth(delta){ let nm=state.m+delta, ny=state.y; if(nm<0){nm=11;ny--;} if(nm>11){nm=0;ny++;} state.y=ny; state.m=nm; render(); }

function deleteMission(id){
  const mm=missionById(id); if(!mm) return;
  if(!confirm('"'+mm.name+'" 미션을 삭제할까요?\n(지난 기록의 적립액은 그만큼 줄어듭니다)')) return;
  state.data.missions=state.data.missions.filter(x=>x.id!==id);
  save(); render();
}
function deleteEntry(id){ state.data.ledger=state.data.ledger.filter(e=>e.id!==id); save(); render(); }

/* 미션 추가/수정 */
function openMission(id){
  const mm = id? missionById(id) : null;
  const ov=makeOverlay(`
    <h2>${mm?'미션 수정':'미션 추가'}</h2>
    <p>이모지 · 이름 · 한 번 할 때 용돈</p>
    <input class="field" id="mEmoji" placeholder="이모지 (예: 🐕)" value="${mm?esc(mm.emoji):''}" maxlength="4">
    <input class="field" id="mName" placeholder="미션 이름 (예: 쿠키 산책)" value="${mm?esc(mm.name):''}">
    <input class="field" id="mRew" type="number" inputmode="numeric" placeholder="용돈(원)" value="${mm?mm.reward:500}">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="mCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="mSave" style="flex:1;">저장</button>
    </div>`);
  ov.querySelector('#mCancel').onclick=()=>ov.remove();
  ov.querySelector('#mSave').onclick=()=>{
    const emoji=ov.querySelector('#mEmoji').value.trim()||'⭐';
    const name=ov.querySelector('#mName').value.trim();
    const reward=Math.max(0, Math.round(Number(ov.querySelector('#mRew').value)||0));
    if(!name){ alert('미션 이름을 입력해 주세요'); return; }
    if(mm){ mm.emoji=emoji; mm.name=name; mm.reward=reward; }
    else { state.data.missions.push({ id:rid(), emoji, name, reward }); }
    save(); ov.remove(); render();
  };
}

/* 용돈기입장 항목 추가/수정 */
function openEntry(type, kid, existing){
  const todayStr=new Date().toISOString().slice(0,10);
  const e=existing||null;
  const ov=makeOverlay(`
    <h2>${e?'기록 수정':(type==='in'?'수입 추가':(kid?'🛒 오늘 뭐 샀어요?':'지출 추가'))}</h2>
    <div class="seg" id="seg">
      <button data-t="in" class="${(e?e.type:type)==='in'?'sel-in':''}">+ 수입</button>
      <button data-t="out" class="${(e?e.type:type)==='out'?'sel-out':''}">− 지출</button>
    </div>
    <input class="field" id="eAmt" type="number" inputmode="numeric" placeholder="금액(원)" value="${e?e.amount:''}">
    <input class="field" id="eNote" placeholder="${type==='in'?'내용 (예: 용돈, 세뱃돈)':'무엇을 샀나요? (예: 과자)'}" value="${e?esc(e.note||''):''}">
    <input class="field" id="eDate" type="date" value="${e?e.date9||e.date:todayStr}">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="eCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="eSave" style="flex:1;">${e?'수정':'기록하기'}</button>
    </div>`);
  let t = e? e.type : type;
  const segBtns=ov.querySelectorAll('#seg button');
  segBtns.forEach(b=> b.onclick=()=>{ t=b.getAttribute('data-t'); segBtns.forEach(x=>x.className=''); b.className = t==='in'?'sel-in':'sel-out'; });
  ov.querySelector('#eCancel').onclick=()=>ov.remove();
  ov.querySelector('#eSave').onclick=()=>{
    const amount=Math.round(Number(ov.querySelector('#eAmt').value)||0);
    if(amount<=0){ alert('금액을 입력해 주세요'); return; }
    const isoDate=ov.querySelector('#eDate').value||todayStr;
    const [yy,mm,dd]=isoDate.split('-').map(Number);
    const dateKey = yy+'-'+mm+'-'+dd;
    const note=ov.querySelector('#eNote').value.trim();
    if(e){ e.type=t; e.amount=amount; e.note=note; e.date=dateKey; delete e.date9; }
    else { state.data.ledger.push({ id:rid(), type:t, amount, note, date:dateKey }); }
    save(); ov.remove(); render();
  };
}
function editEntry(id){
  const e=state.data.ledger.find(x=>x.id===id); if(!e) return;
  // date(YYYY-M-D) -> input[type=date] 용 YYYY-MM-DD
  const [y,m,d]=e.date.split('-').map(Number);
  e.date9 = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  openEntry(e.type, false, e);
}

/* 날짜별 미션 체크 편집 (달력 셀 클릭) */
function openDay(y,m,d){
  const ids=doneIds(y,m,d);
  const rows=state.data.missions.map(mm=>{
    const on=ids.includes(mm.id);
    return `<div class="mrow ${on?'on':''}" style="cursor:pointer;" data-tg="${mm.id}">
      <span class="memoji">${mm.emoji||'⭐'}</span>
      <div style="flex:1; text-align:left;"><div class="mname">${esc(mm.name)}</div><div class="mrew">${won(mm.reward)}</div></div>
      <span style="font-size:24px;">${on?'✅':'⬜'}</span>
    </div>`;
  }).join('') || '<p style="color:#9bb3d4;">미션이 없습니다.</p>';
  const ov=makeOverlay(`
    <h2>${y}년 ${m+1}월 ${d}일</h2>
    <p>완료한 미션을 눌러서 켜고 끄세요</p>
    <div>${rows}</div>
    <button class="smallbtn" id="dClose" style="width:100%; margin-top:6px;">닫기</button>`);
  ov.querySelector('#dClose').onclick=()=>ov.remove();
  ov.querySelectorAll('[data-tg]').forEach(r=> r.onclick=()=>{
    toggleMission(y,m,d, r.getAttribute('data-tg'), false);
    ov.remove(); openDay(y,m,d); // 새로고침
  });
}

/* ---------- 설정 / 역할 ---------- */
function openSettings(){
  const role=getRole();
  const ov=makeOverlay(`
    <h2>⚙️ 설정</h2>
    <p>이 기기 모드: <b style="color:#2e5d9f;">${role==='admin'?'아빠 관리자':'아이(아들)'}</b></p>
    ${role==='admin'? '<button class="rolebtn kid" id="toKid">🧒 아이 모드로 바꾸기</button>'
                    : '<button class="rolebtn dad" id="toAdmin">👨‍👦 아빠 관리자 모드로 바꾸기</button>'}
    <button class="smallbtn" id="closeSet" style="width:100%; margin-top:4px;">닫기</button>`);
  ov.querySelector('#closeSet').onclick=()=>ov.remove();
  const tk=ov.querySelector('#toKid'); if(tk) tk.onclick=()=>{ setRole('kid'); ov.remove(); render(); };
  const ta=ov.querySelector('#toAdmin'); if(ta) ta.onclick=()=>{ ov.remove(); askPin(()=>{ setRole('admin'); render(); }); };
}
function askPin(onOk){
  const ov=makeOverlay(`
    <h2>🔒 비밀번호</h2><p>아빠 관리자 비밀번호 4자리</p>
    <input class="pininput" id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    <div style="display:flex; gap:10px;">
      <button class="smallbtn" id="pinCancel" style="flex:1;">취소</button>
      <button class="smallbtn primary" id="pinOk" style="flex:1;">확인</button>
    </div>`);
  const input=ov.querySelector('#pin'); setTimeout(()=>input.focus(),100);
  const submit=()=>{ if(input.value===String(CFG.adminPin)){ ov.remove(); onOk(); } else { input.value=''; input.placeholder='틀렸어요'; input.style.borderColor='#e57373'; } };
  ov.querySelector('#pinOk').onclick=submit;
  ov.querySelector('#pinCancel').onclick=()=>{ ov.remove(); render(); };
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
}
function chooseRole(){
  const ov=makeOverlay(`
    <h2>누구의 폰인가요?</h2><p>이 기기에서 사용할 모드를 골라주세요</p>
    <button class="rolebtn kid" id="pickKid">🧒 아이(아들) 폰</button>
    <button class="rolebtn dad" id="pickDad">👨‍👦 아빠(관리자) 폰</button>`, true);
  ov.querySelector('#pickKid').onclick=()=>{ setRole('kid'); ov.remove(); render(); };
  ov.querySelector('#pickDad').onclick=()=>{ ov.remove(); askPin(()=>{ setRole('admin'); render(); }); };
}

/* ---------- 공통 ---------- */
function makeOverlay(html, sticky){
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML='<div class="sheet">'+html+'</div>';
  if(!sticky) ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov); return ov;
}
function syncLabel(){
  if(!configFilled) return '⚠️ Firebase 미설정 — 이 기기에만 저장됩니다';
  return { connecting:'☁️ 연결 중…', ok:'✅ 실시간 동기화 켜짐', offline:'📴 오프라인 — 연결되면 자동 저장', error:'⚠️ 연결 오류' }[state.sync]||'';
}
function render(){
  if(!state.ready) return;
  if(!getRole()){ renderKid(); if(!document.querySelector('.overlay')) chooseRole(); return; }
  if(getRole()==='admin') renderAdmin(); else renderKid();
}

/* ---------- 부팅 ---------- */
(function boot(){
  try { const s=JSON.parse(localStorage.getItem('milkData')||'null'); if(s&&s.missions) state.data=migrate(s); } catch(e){}
  state.ready=true;
  if(!initFirebase()) state.sync = configFilled?'error':'offline';
  render();
})();

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
</script>
